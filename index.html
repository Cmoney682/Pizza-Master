<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let cx=200, cy=200, r=180;

let slices=[];
let offset=0;

let speed=0.01;
let score=0;
let playing=true;

function drawPizza(){
    ctx.clearRect(0,0,400,400);

    // pizza
    ctx.beginPath();
    ctx.arc(cx,cy,r,0,Math.PI*2);
    ctx.fillStyle="#ffd54f";
    ctx.fill();

    // slice lines
    ctx.strokeStyle="#5d4037";
    ctx.lineWidth=3;

    slices.forEach(a=>{
        let ang=a+offset;

        ctx.beginPath();
        ctx.moveTo(cx,cy);
        ctx.lineTo(cx+Math.cos(ang)*r, cy+Math.sin(ang)*r);
        ctx.stroke();
    });
}

function loop(){
    if(!playing) return;

    offset+=speed;
    drawPizza();
    requestAnimationFrame(loop);
}

function norm(a){
    return (a+Math.PI*2)%(Math.PI*2);
}

function tap(){
    if(!playing) return;

    let a=norm(-offset);

    // collision = game over
    for(let s of slices){
        if(Math.abs(norm(s-a))<0.18){
            gameOver();
            return;
        }
    }

    // add slice
    slices.push(a);
    score++;

    // increase difficulty over time
    speed += 0.0003;

    document.getElementById("score").textContent = score;
}

canvas.addEventListener("click",tap);
canvas.addEventListener("touchstart",tap);

function gameOver(){
    playing=false;
    document.getElementById("finalScore").textContent="Slices: "+score;
    document.getElementById("gameOver").style.display="flex";
}

function restart(){
    slices=[];
    offset=0;
    speed=0.01;
    score=0;
    playing=true;

    document.getElementById("score").textContent=0;
    document.getElementById("gameOver").style.display="none";

    loop();
}

loop();
</script>
